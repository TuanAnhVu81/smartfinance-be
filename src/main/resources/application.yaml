spring:
  application:
    name: SmartFinance Backend
  profiles:
    active: dev

app:
  jwt:
    secret: ${JWT_SECRET:changeme-dev-secret-key-must-be-32-chars-or-more-for-hmac-sha256}
    expiration-ms: 3600000        # 1 hour
    refresh-expiration-ms: 604800000  # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
